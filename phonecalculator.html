<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phone calculator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: rgb(112, 72, 255);
      }
      .container {
        background-color: rgb(2, 2, 2);
        margin: auto;
        width: 260px;
        height: 500px;
        margin-top: 50px;
        justify-content: center;
        border-radius: 30px;
      }
      button {
        background-color: rgb(194, 194, 199);
        width: 58px;
        height: 58px;
        gap: 10px;
        border-radius: 100%;
        border: none;
        margin-bottom: 10px;
        font-size: 20px;
      }
      .buttons {
        /* margin-top: 140px; */
        justify-content: space-around;
        margin-left: 10px;
        margin-bottom: 20px;
        margin-top: 20px;
      }
      .display {
        font-size: 30px;
        font-weight: bold;
        padding: 60px 40px 40px 40px;
        text-align: right;
        /* word-wrap: break-word;
        outline: none; */
        overflow: hidden;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="display">
        <div id="previous-operand"></div>
        <div id="current-operand">0</div>
      </div>
      <div class="buttons">
        <div>
          <button>C</button>
          <button>D</button>
          <button>%</button>
          <button>/</button>
        </div>
        <div>
          <button>7</button>
          <button>8</button>
          <button>9</button>
          <button>*</button>
        </div>
        <div>
          <button>4</button>
          <button>5</button>
          <button>6</button>
          <button>-</button>
        </div>
        <div>
          <button>1</button>
          <button>2</button>
          <button>3</button>
          <button>+</button>
        </div>
        <div>
          <button>()</button>
          <button>0</button>
          <button>.</button>
          <button>=</button>
        </div>
      </div>
    </div>
    <script>
      const display = document.getElementById("current-operand");
      const buttons = document.querySelectorAll("button");
      const operators = ["+", "-", "*", "/", "%"];

      buttons.forEach((btn) => {
        btn.addEventListener("click", () => {
          const val = btn.innerText;
          const current = display.textContent;
          const lastChar = current.slice(-1);

          // Clear Logic
          if (val === "C") {
            display.textContent = "0";
          }

          // Delete Logic
          else if (val === "D") {
            display.textContent =
              current.length > 1 ? current.slice(0, -1) : "0";
          }

          // Equals Logic (with auto-closing brackets)
          else if (val === "=") {
            try {
              let expression = current
                .replace(/%/g, "/100")

                // 8(2) -> 8*(2)
                .replace(/(\d)\(/g, "$1*(")

                // (2)8 -> (2)*8
                .replace(/\)(\d)/g, ")*$1")

                // )( -> )*(
                .replace(/\)\(/g, ")*(");

              // Count parens and close any that are missing
              const openCount = (expression.match(/\(/g) || []).length;
              const closeCount = (expression.match(/\)/g) || []).length;
              if (openCount > closeCount) {
                expression += ")".repeat(openCount - closeCount);
              }

              const result = eval(expression);
              // Handle long decimals like 0.1 + 0.2
              display.textContent = Number.isInteger(result)
                ? result
                : parseFloat(result.toFixed(8));
            } catch {
              display.textContent = "Error";
            }
          } else if (val === "()") {
            const openCount = (current.match(/\(/g) || []).length;
            const closeCount = (current.match(/\)/g) || []).length;

            // Open bracket cases
            if (
              current === "0" ||
              operators.includes(lastChar) ||
              lastChar === "("
            ) {
              display.textContent = current === "0" ? "(" : current + "(";
            }

            // Close bracket if there is an unclosed "("
            else if (openCount > closeCount) {
              display.textContent += ")";
            }

            // If last char is a number or ")", auto multiply
            else {
              display.textContent += "*(";
            }
          }

          // Operator and Number Logic
          else {
            if (operators.includes(val)) {
              if (operators.includes(lastChar)) {
                // Replace the last operator with the new one
                display.textContent = current.slice(0, -1) + val;
              } else {
                display.textContent += val;
              }
            }
             else {
              // Input is a number
              if (current === "0" && val !== ".") {
                display.textContent = val;
              } else {
                display.textContent += val;
              }
            }
          }
        });
      });
    </script>
  </body>
</html>
