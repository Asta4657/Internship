<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-indigo-100 flex justify-center items-center min-h-screen p-2 overflow-hidden">

    <main class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-4">

        <div class="flex justify-center mb-4">
            <div class="bg-indigo-100 p-4 rounded-2xl">
                <img class="w-7 h-7" src="picture_and_logo/add.png" alt="">
            </div>
        </div>

        <div class="text-center mb-4">
            <h1 class="text-3xl font-bold text-gray-900">
                Create Account
            </h1>

            <p class="text-gray-500 mt-2 text-sm">
                Join us today! It only takes a minute.
            </p>
        </div>

        <form class="space-y-5">

            <div class="grid md:grid-cols-2 gap-2">

                <div class="flex flex-col">
                    <label class="text-sm font-semibold mb-2">
                        Full Name
                    </label>

                    <input class="border border-gray-300 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-400" type="text"
                        placeholder="John Doe">
                </div>

                <div class="flex flex-col">
                    <label class="text-sm font-semibold mb-2">
                        Email Address
                    </label>

                    <input class="border border-gray-300 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-400" type="email"
                        placeholder="name@company.com">
                </div>

            </div>

            <div class="flex flex-col">
                <label class="text-sm font-semibold mb-2">
                    Password
                </label>

                <input class="border border-gray-300 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-400" type="password"
                    placeholder="********">
            </div>

            <div class="flex flex-col">
                <label class="text-sm font-semibold mb-2">
                    Confirm Password
                </label>

                <input class="border border-gray-300 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-400" type="password"
                    placeholder="********">
            </div>
            <div class="flex items-start gap-3 text-sm text-gray-600">
                <input type="checkbox" class="mt-1">

                <p>
                    I agree to the
                    <span class="text-indigo-600 font-medium cursor-pointer hover:underline">
                        Terms of Service
                    </span>
                    and
                    <span class="text-indigo-600 font-medium cursor-pointer hover:underline">
                        Privacy Policy
                    </span>
                </p>
            </div>
            <button class="w-full bg-indigo-600 hover:bg-indigo-700 transition text-white py-3 rounded-xl font-semibold shadow-md">
                Create My Account >>
            </button>

        </form>

        <div class="text-center mt-6 text-sm text-gray-500">
            Already have an account?
            <span class="text-indigo-600 font-semibold cursor-pointer hover:underline">
                Sign in here
            </span>
        </div>

    </main>

</body>

</html>
