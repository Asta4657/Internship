<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-blue-50 min-h-screen flex justify-center items-center p-5 overflow-hidden">
    <main class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-10">
      <div class="flex justify-center mb-6">
        <div class="bg-blue-100 p-4 rounded-2xl">
          <img class="w-8 h-8" src="picture_and_logo/locked.png" alt="" />
        </div>
      </div>

      <div class="text-center mb-8">
        <h1 class="text-4xl font-extrabold text-black">Welcome Back</h1>

        <p class="text-gray-500 mt-3 text-sm">
          Enter your credentials to access your account
        </p>
      </div>

      <form class="space-y-5">
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-700 mb-2">
            Email Address
          </label>

          <input
            class="border border-gray-200 bg-gray-50 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-400"
            type="email"
            placeholder="name@company.com"
          />
        </div>

        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-700 mb-2">
            Password
          </label>

          <input
            class="border border-gray-200 bg-gray-50 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-400"
            type="password"
            placeholder="••••••••"
          />
        </div>

        <div class="flex justify-between items-center text-sm">
          <div class="flex items-center gap-2 text-gray-500">
            <input type="checkbox" />
            <p>Remember me</p>
          </div>

          <a href="#" class="text-blue-600 font-semibold hover:underline">
            Forgot password?
          </a>
        </div>

        <button
          class="w-full bg-blue-600 hover:bg-blue-700 transition duration-300 text-white py-3 rounded-xl font-semibold shadow-lg"
        >
          Log In →
        </button>
      </form>

      <div class="text-center mt-8 text-sm text-gray-500">
        Don’t have an account yet?
        <span
          class="text-blue-600 font-semibold cursor-pointer hover:underline"
        >
          Sign up for free
        </span>
      </div>
    </main>
  </body>
</html>
