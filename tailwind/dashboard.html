<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <main class="bg-gray-600 p-4 grid sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        <div class="bg-white p-4 rounded-lg">
            <span class="bg-lime-600 p-1 rounded-lg">📊</span>
            <h1 class="font-extrabold">2.4k</h1>
            <p class="text-gray-400">Page viewer</p>
        </div>
        <div class="bg-white p-4 rounded-lg">
            <p class="inline bg-green-300 p-1 rounded-lg">💰</p>
            <h1 class="font-extrabold">$8.2k</h1>
            <p class="text-gray-400">Revenue</p>
        </div>
        <div class="bg-white p-4 rounded-lg">
            <p class="inline p-1 rounded-lg bg-teal-400">👥</p>
            <h1 class="font-extrabold">892</h1>
            <p class="text-gray-400">New Users</p>
        </div>
        <div class="bg-white p-4 rounded-lg">
            <p class="inline p-1 rounded-lg bg-cyan-500">⭐</p>
            <h1 class="font-extrabold">4.9</h1>
            <p class="text-gray-400">Rating</p>
        </div>
    </main>
    
</body>
</html>
