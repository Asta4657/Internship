<!doctype html>

  <title>Document</title>
  <script src="https://cdn.tailwindcss.com"></script>

<body>
  <div
    class="flex justify-center gap-10  rounded-xl w-2/3 mx-auto mt-24 bg-blue-300 p-10 grid grid-cols-1 md:grid-cols-2">

      <h1 class="font-bold p-5">Update variables</h1>

      <label>VIP Status(Boolean)</label>
      <input type="checkbox" />

      <label> Card color</label>
      <input type="color" />
    </div>
    
    <div class=" rounded-xl mr-8">
      <h2 class="font-bold p-5">Live DOM Output</h2>
      <div class="flex flex-col rounded-lg w-[300px] bg-white gap-6 hover:shadow-xl mr-[80px] p-4 ">
        <label class="bg-yellow-300 rounded-xl text-center text-[10px] w-[80px] ring-1">Vip Member</label>

        <label>Age:28</label>
      </div>
    </div>
